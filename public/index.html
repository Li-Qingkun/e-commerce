<!DOCTYPE html>
<html lang="zh-CN">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>放单计划管理系统</title>
		<link rel="icon" href="./images/logo.png" type="image/png">
		<link rel="shortcut icon" href="./images/logo.png" type="image/x-icon">
		<link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/3.4.1/css/bootstrap.min.css">
		<link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
		<link rel="stylesheet" href="css/style.css">
	</head>
	<body oncontextmenu="return false;">
		<!-- 顶部导航栏 -->
		<nav class="navbar navbar-custom">
			<div class="container-fluid">
				<div class="navbar-header">
					<a class="navbar-brand" href="#">
						<img src="images/logo.png" alt="logo">
						<span class="system-name">放单计划管理系统</span>
					</a>
					<div class="shop-mobile-toggle" id="shopMobileToggle">
						<i class="fa fa-store"></i> 切换店铺
					</div>
				</div>

				<div class="shop-switcher" id="shopSwitcher">
					<span class="shop-label">当前店铺：</span>
					<div class="shop-btn-group" id="shopBtnGroup"></div>
				</div>

				<div class="nav-menu-area" id="dynamicMenuContainer">
					<ul class="nav-menu-list" id="mainMenuList"></ul>
				</div>

				<div class="navbar-right nav-user-area">
					<div class="user-dropdown" id="userDropdown">
						<span class="user-info" id="userNameDisplay">登录用户：</span>
						<i class="fa fa-caret-down"></i>
						<div class="dropdown-menu" id="userMenu">
							<div class="dropdown-item" id="btnChangePwd"><i class="fa fa-key"></i> 修改密码</div>
							<div class="dropdown-item" id="btnAddShop"><i class="fa fa-store"></i> 新增店铺</div>
							<div class="dropdown-item" id="btnRechargeRecord"><i class="fa fa-history"></i> 充值记录</div>
							<div class="dropdown-item" id="btnSystemSettings"><i class="fa fa-cog"></i> 设置</div>
							<div class="dropdown-item" id="btnAdminLogout"><i class="fa fa-sign-out"></i> 退出登录</div>
						</div>
					</div>
				</div>
			</div>
		</nav>

		<!-- 主内容容器 -->
		<div class="main-container">
			<div class="btn-toolbar">
				<div class="btn-group left-btn-group">
					<button class="btn btn-primary" id="btnAdd"><i class="fa fa-plus"></i> 新增计划</button>
					<button class="btn btn-warning" id="btnLoadData"><i class="fa fa-refresh"></i> 加载数据</button>
					<button class="btn btn-info" id="btnCompareTodayTomorrow"><i class="fa fa-calendar-check-o"></i>
						今日/明日计划对比</button>
					<button class="btn btn-info" id="btnCompareYesterdayToday"><i class="fa fa-calendar-check-o"></i>
						昨日/今日计划对比</button>
				</div>
				<div class="btn-group right-btn-group">
					<button class="btn btn-primary active" id="btnShowTimeline"><i class="fa fa-timeline"></i>
						时间轴视图</button>
					<button class="btn btn-default" id="btnShowTable"><i class="fa fa-table"></i> 表格视图</button>
				</div>
			</div>

			<div id="timelineContainerWrapper" class="content-wrapper">
				<div id="timelineContainer" class="timeline-container">
					<div id="timelineHeader" class="timeline-header"></div>
					<div id="timelineContent" class="timeline-content"></div>
				</div>
			</div>

			<div id="tableContainer" class="content-wrapper" style="display: none;">
				<table class="table table-bordered table-hover">
					<thead>
						<tr>
							<th>链接商品ID</th>
							<th>链接商品名称</th>
							<th>SKU名称</th>
							<th>SKU价格</th>
							<th>创建时间</th>
							<th>操作</th>
						</tr>
					</thead>
					<tbody id="planTableBody"></tbody>
				</table>
			</div>
		</div>

		<!-- 模态框容器：所有子页面通过JS加载 -->
		<div id="modalContainer"></div>

		<!-- Toast提示容器 -->
		<div class="toast-container" id="toastContainer"></div>
		
		<!-- JS -->
		<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
		<script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/3.4.1/js/bootstrap.min.js"></script>
		<script src="js/script.js"></script>
	</body>
</html>
