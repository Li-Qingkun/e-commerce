<div class="modal fade" id="addShopModal" tabindex="-1" role="dialog">
	<div class="modal-dialog" role="document">
		<div class="modal-content">
			<div class="modal-header">
				<button type="button" class="close" data-dismiss="modal" aria-label="Close">
					<span aria-hidden="true">&times;</span>
				</button>
				<h4 class="modal-title">
					<i class="fa fa-store"></i> 新增店铺
				</h4>
			</div>
			<div class="modal-body">
				<form id="addShopForm">
					<div class="form-group">
						<label for="newShopName">店铺名称 <span class="required">*</span></label>
						<input type="text" class="form-control" id="newShopName" placeholder="请输入新增店铺名称" required>
					</div>
					<div class="form-group">
						<label for="newShopType">店铺类型 <span class="required">*</span></label>
						<select class="form-control" id="newShopType" required>
							<option value="tb">天猫</option>
							<option value="dy">抖音</option>
							<option value="pdd">拼多多</option>
						</select>
					</div>
				</form>
			</div>
			<div class="modal-footer">
				<button type="button" class="btn btn-default" data-dismiss="modal">取消</button>
				<button type="button" class="btn btn-primary" id="btnSaveShop">确认新增</button>
			</div>
		</div>
	</div>
</div>
