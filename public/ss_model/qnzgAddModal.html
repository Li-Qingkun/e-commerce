<!-- 创建推广订单模态框 id: qnzgAddModal -->
<div class="modal fade" id="qnzgAddModal" tabindex="-1" role="dialog" aria-labelledby="qnzgAddModalLabel"
	data-backdrop="static">
	<div class="modal-dialog modal-lg" role="document">
		<div class="modal-content">
			<div class="modal-header">
				<button type="button" class="close" data-dismiss="modal" aria-label="Close"><span
						aria-hidden="true">&times;</span></button>
				<h4 class="modal-title" id="qnzgAddModalLabel">创建推广订单</h4>
			</div>
			<div class="modal-body" style="max-height: 70vh; overflow-y: auto;">
				<form id="qnzgAddForm" class="form-horizontal">

					<!-- 1. 刷单计划名（下拉） -->
					<div class="form-group">
						<label class="col-sm-3 control-label">刷单计划名</label>
						<div class="col-sm-8">
							<select class="form-control" id="planNameSelect">
								<option value="">请选择计划</option>
							</select>
						</div>
					</div>

					<!-- 2. 搜索词 -->
					<div class="form-group">
						<label class="col-sm-3 control-label">搜索词</label>
						<div class="col-sm-8">
							<input type="text" class="form-control" id="goodsPassword" placeholder="自动填充">
						</div>
					</div>

					<!-- 3. 刷单金额 -->
					<div class="form-group">
						<label class="col-sm-3 control-label">刷单金额</label>
						<div class="col-sm-8">
							<input type="number" class="form-control" id="doudianPrice" readonly placeholder="自动填充">
						</div>
					</div>

					<!-- 4. 商品链接 -->
					<div class="form-group">
						<label class="col-sm-3 control-label">商品链接</label>
						<div class="col-sm-8">
							<textarea class="form-control" id="goodsUrl" rows="2" readonly
								placeholder="自动填充"></textarea>
						</div>
					</div>

					<hr>

					<!-- 5. 性别单选 -->
					<div class="form-group">
						<label class="col-sm-3 control-label">性别</label>
						<div class="col-sm-8">
							<label class="radio-inline"><input type="radio" name="genderLabel" value="0"
									checked>不限</label>
							<label class="radio-inline"><input type="radio" name="genderLabel" value="1">男</label>
							<label class="radio-inline"><input type="radio" name="genderLabel" value="2">女</label>
						</div>
					</div>

					<!-- 6. 年龄单选 -->
					<div class="form-group">
						<label class="col-sm-3 control-label">年龄</label>
						<div class="col-sm-8">
							<label class="radio-inline"><input type="radio" name="ageLabel" value="0" checked>默认</label>
							<label class="radio-inline"><input type="radio" name="ageLabel" value="1">＜25</label>
							<label class="radio-inline"><input type="radio" name="ageLabel" value="2">25-34</label>
							<label class="radio-inline"><input type="radio" name="ageLabel" value="3">35-45</label>
							<label class="radio-inline"><input type="radio" name="ageLabel" value="4">＞45</label>
						</div>
					</div>
					
					<!-- 7. 是否代发 单选 -->
					<div class="form-group" id="sfdfGroup">
						<label class="col-sm-3 control-label">是否代发</label>
						<div class="col-sm-8">
							<label class="radio-inline"><input type="radio" name="sfdf" value="0" checked>是</label>
							<label class="radio-inline"><input type="radio" name="sfdf" value="1">否</label>
						</div>
					</div>

					<hr>

					<!-- 8. 时间段 + 单量 -->
					<div class="form-group">
						<label class="col-sm-3 control-label">时间段 & 单量</label>
						<div class="col-sm-8" id="timeIntervalContainer">
							<div class="alert alert-info">请先选择计划</div>
						</div>
					</div>

					<div class="form-group">
						<div class="col-sm-offset-3 col-sm-8">
							<span id="totalOrderCount" class="label label-primary">已选：0 单</span>
							<span id="maxOrderLimit" class="label label-warning">上限：0 单</span>
						</div>
					</div>
				</form>
			</div>
			<div class="modal-footer">
				<button type="button" class="btn btn-default" data-dismiss="modal">取消</button>
				<button type="button" class="btn btn-primary" id="btnCreateQnzgOrder">确认创建推广订单</button>
			</div>
		</div>
	</div>
</div>
