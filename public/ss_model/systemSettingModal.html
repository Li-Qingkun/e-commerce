<div class="modal fade" id="systemSettingModal" tabindex="-1" role="dialog">
	<div class="modal-dialog" role="document">
		<div class="modal-content">
			<div class="modal-header">
				<button type="button" class="close" data-dismiss="modal" aria-label="Close">
					<span aria-hidden="true">&times;</span>
				</button>
				<h4 class="modal-title">
					<i class="fa fa-cog"></i> 系统基础设置
				</h4>
			</div>
			<div class="modal-body">
				<form id="systemSettingForm">
					<div style="margin-bottom:15px; border-bottom:1px solid #eee; padding-bottom:8px;">
						<button type="button" class="btn btn-sm btn-primary setting-tab"
							data-target="setting-postpic">晒图相关</button>
						<button type="button" class="btn btn-sm btn-default setting-tab"
							data-target="setting-other">其他设置</button>
					</div>
					<div class="setting-group" id="setting-postpic">
						<h5 class="setting-group-title">
							<i class="fa fa-picture-o"></i> 晒图相关
						</h5>
						<div class="form-group">
							<div class="checkbox">
								<label>
									<input type="checkbox" id="postPictureReminderEnabled">
									是否开启晒图提醒（勾选即开启查询提醒）
								</label>
							</div>
						</div>
						<div class="form-group">
							<label for="postPictureReminderDay">晒图提醒天数</label>
							<select class="form-control" id="postPictureReminderDay">
								<option value="">请选择提醒天数</option>
							</select>
							<small class="text-muted">第几天提醒查看评价情况</small>
						</div>
						<div class="form-group">
							<label for="postPictureReminderTimes">提醒次数</label>
							<select class="form-control" id="postPictureReminderTimes">
								<option value="">请选择提醒次数</option>
							</select>
							<small class="text-muted">从提醒天数往后顺延连续几天提醒</small>
						</div>
					</div>
					<div class="setting-group" id="setting-other" style="display:none;">
						<h5 class="setting-group-title">
							<i class="fa fa-cog"></i> 其他设置
						</h5>
						<div class="form-group">
							<label>示例配置项</label>
							<input type="text" class="form-control" placeholder="这里可以放其他配置">
						</div>
					</div>
				</form>
			</div>
			<div class="modal-footer">
				<button type="button" class="btn btn-default" data-dismiss="modal">取消</button>
				<button type="button" class="btn btn-primary" id="btnSaveSystemSettings">保存设置</button>
			</div>
		</div>
	</div>
</div>
